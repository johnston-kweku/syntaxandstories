{% extends 'syntaxandstories/base.html' %}
{% load static %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-4">

<div class="flex flex-col gap-3 items-center justify-center bg-white rounded-2xl  shadow-2xl mb-16 w-full sm:w-8/12 max-w-sm py-8">

    <span class="bg-linear-to-r from-violet-600 to-fuchsia-600 px-4 py-2 rounded-2xl">
        <svg class="stroke-white stroke-2 w-8" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
        </svg>
    </span>

    <h1 class="text-3xl sm:text-4xl font-bold text-gray-800">
        Welcome back
    </h1>

    <p class="text-gray-600 mb-4">
        Log in to continue your journey
    </p>

<form method="post" class="flex flex-col gap-6 items-center justify-center w-full px-6" autocomplete="off">
    {% csrf_token %}

    {% if error %}
    <p class="text-red-500 text-sm">
        {{ error }}
    </p>
    {% endif %}

    <div class="flex flex-col relative w-full gap-2">
        <label for="id_email" class="font-semibold text-gray-500">Email</label>

        <div class="relative w-full">
            <input
                type="email"
                name="email"
                id="id_email"
                placeholder="you@example.com"
                autocomplete="email"
                class="invalid:border-red-500 w-full rounded-xl p-3 border text-gray-600 border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500"
            >

            <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 text-gray-400"
                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
            </svg>
        </div>
    </div>

    <div class="flex flex-col w-full gap-2">
        <label for="id_password" class="font-semibold text-gray-500">Password</label>

        <div class="relative w-full">
            <input
                type="password"
                name="password"
                id="id_password"
                autocomplete="current-password"
                class="w-full rounded-xl p-3 border text-gray-600 border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500"
            >

            <svg id="show-password"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-5 cursor-pointer text-gray-400"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor">

                <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
        </div>
    </div>

    <div class="w-full text-right">
        <a href="#" class="text-purple-700 font-semibold text-sm hover:underline">
            Forgot Password?
        </a>
    </div>

    <button
        type="submit"
        class="w-full flex items-center justify-center gap-2 py-3 bg-linear-to-r from-violet-600 to-fuchsia-600 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl hover:scale-105 transition-all">

        <svg xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5">

        <path stroke-linecap="round" stroke-linejoin="round"
        d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
        </svg>

        Log in
    </button>

    <div class="text-sm text-gray-600">
        Don't have an account?
        <a href="{% url 'user:sign_up' %}" class="text-purple-600 font-semibold hover:underline">
            Sign Up
        </a>
    </div>

</form>
</div>

</div>

<script src="{% static 'js/login.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load("tsparticles", {
  background: { color: { value: "transparent" } },
  fpsLimit: 60,
  particles: {
    number: { value: 30, density: { enable: true, area: 800 } },
    color: { value: "#a855f7" },
    shape: { type: "circle" },
    opacity: { value: 0.6 },
    size: { value: { min: 10, max: 70 } },
    move: { enable: true, speed: 1.5, random: true, straight: false, outModes: { default: "out" } },
    links: { enable: false }
  },
  interactivity: {
    events: { onHover: { enable: true, mode: "repulse" } },
    modes: { repulse: { distance: 100, duration: 0.4 } }
  },
  detectRetina: true
});
</script>

{% endblock %}
