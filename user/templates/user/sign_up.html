{% extends 'syntaxandstories/base.html' %}
{% load static %}

{% block content %}
<div id="tsparticles"></div>

<div  class="flex flex-col items-center justify-center py-10 my-6 bg-white rounded-2xl sm:w-100 sm:mx-auto mx-5 shadow-2xl">
    <span class="bg-linear-to-r from-violet-600 to-fuchsia-600 px-4 py-3 my-2 rounded-2xl">
        <svg class="stroke-white w-8 hover:scale-100" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
        </svg>
    </span>
    <h1 class="font-black text-3xl">
        Join Our Community
    </h1>
    <form method="post" class="p-10 mx-auto flex flex-col gap-4 items-center justify-center w-full" autocomplete="off">
        {% csrf_token %}
        {% if form.non_field_errors %}
        <p>
            {{ form.non_field_errors }}
        </p>
        {% endif %}
        <div class="flex flex-col relative items-start gap-2">
            <label class="font-bold text-lg text-gray-400" for="id_first_name">Full Name</label>
            <input autocomplete="off" type="text" name="first_name" id="id_first_name" placeholder="John Doe" class="w-80 rounded-xl p-3 border text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500">

            <svg class="absolute right-3 pt-5.5 top-1/3 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" >
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
        </div>


        <div class="flex flex-col relative items-start gap-2">
            <label for="id_email" class="font-bold text-lg text-gray-400">Email</label>
            <input  type="email" name="email" id="id_email" placeholder="you@example.com" class="w-80 invalid:border-red-600 rounded-xl p-3 border text-gray-500 border-gray-300 focus:outline-none focus:ring-0 focus:ring-purple-500" autocomplete="new-email">

            <svg class="absolute right-3 pt-5.5 top-1/3 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" >
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
        </div>

        <div class="flex flex-col items-start gap-2">
            <label for="id_password" class="font-bold text-lg text-gray-400">Password</label>

            <div class="relative w-80"> <!-- make this relative -->
                <input autocomplete="new-password" type="password" name="password" id="id_password"
                    class="w-full rounded-xl p-3 border text-gray-500 border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <svg id="show-password" class="absolute right-3 top-1/2 transform -translate-y-1/2 w-5 cursor-pointer" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                </svg>
            </div>
        </div>
        <div class="h-1.5 w-full bg-slate-300 rounded-full">
            <div id="password-gauge" class="h-full rounded-full transition-all duration-300" 
            style="background-color: red; width: 0%;"></div>
        </div>

         <div class="flex flex-col relative items-start gap-2">
            <label for="id_password2" class="font-bold text-lg text-gray-400"> Confirm Password</label>
            <input autocomplete="new-password"  type="password" name="password2" id="id_password2" placeholder="" class="w-80 rounded-xl p-3 border text-gray-500 border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500">
            
            <svg class="absolute right-3 pt-5.5 top-1/3 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" >
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>

        </div>


        <button type="submit" class="sm:w-full w-full flex items-center justify-center gap-2 py-3 bg-linear-to-r from-violet-600 to-fuchsia-600 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl hover:scale-110 transition-all">
            <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" >
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
            </svg>
              Create Account
        </button>
    </form>

    
    <div class="mb-4">
        <p>
            Already have an account? 
            <a href="{% url 'user:login'%}" class="text-purple-600 font-semibold hover:underline">
                Log in
            </a>
        </p>
    </div>
</div>


<script src="{% static 'js/sign_up.js'%}"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script>
tsParticles.load("tsparticles", {
  background: { color: { value: "transparent" } },
  fpsLimit: 60,
  particles: {
    number: { value: 30, density: { enable: true, area: 800 } },
    color: { value: "#a855f7" },
    shape: { type: "circle" },
    opacity: { value: 0.6 },
    size: { value: { min: 10, max: 70 } }, // larger particles
    move: { enable: true, speed: 1.5, random: true, straight: false, outModes: { default: "out" } },
    links: { enable: false }
  },
  interactivity: {
    events: { onHover: { enable: true, mode: "repulse" } },
    modes: { repulse: { distance: 100, duration: 0.4 } }
  },
  detectRetina: true
});
</script>

{% endblock %}
