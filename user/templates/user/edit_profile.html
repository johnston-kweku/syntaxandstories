{% extends 'syntaxandstories/base.html' %}
{% load static %} 

{% block content %}

<div
  class="pb-10"
>
  <div class="max-w-4xl mx-auto px-4">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-6">
      <a
        href="{% url 'user:profile' request.user.username %}"
        class="p-2 hover:bg-white rounded-xl transition"
      >
        ←
      </a>

      <div>
        <h1 class="text-3xl font-bold text-gray-800">Edit Profile</h1>
        <p class="text-gray-600">Update your profile information</p>
      </div>
    </div>

    <div
      class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden"
    >
      <!-- Cover -->
      <div class="h-48 bg-linear-to-r from-violet-600 via-purple-600 to-fuchsia-600"></div>

      <form method="post" enctype="multipart/form-data" class="px-8 pb-8">
        {% csrf_token %}

        <!-- Profile Picture -->
        <div class="flex items-start gap-6 -mt-16 mb-8">
          <div class="relative group">
            {% if form.instance.profile_picture %}
            <img id="avatar-preview"
              src="{{ form.instance.profile_picture.url }}"
              class="w-32 h-32 rounded-2xl border-4 border-white shadow-xl object-cover"
              style="background-size: cover;
              background-attachment: fixed;"
            />
            {% else %}
            <svg
              class="w-36 h-32 rounded-2xl border-4 border-white shadow-2xl"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
              />
            </svg>
            {% endif %}

            <label
              class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition cursor-pointer"
            >
              <svg
                class="w-8 text-white"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6.827 6.175A2.31 2.31 0 0 1 8.487 5.5h7.026
a2.31 2.31 0 0 1 1.66.675l1.913 2.013
a2.31 2.31 0 0 1 .674 1.66v6.804
a2.31 2.31 0 0 1-.674 1.66l-1.913 2.013
a2.31 2.31 0 0 1-1.66.675H8.487
a2.31 2.31 0 0 1-1.66-.675L4.914 18.31
a2.31 2.31 0 0 1-.674-1.66V9.848
c0-.621.246-1.217.674-1.66l1.913-2.013Z"
                />
              </svg>

              <input
                id="id_profile_picture"
                type="file"
                name="profile_picture"
                accept="image/*"
                class="hidden"
              />
            </label>
          </div>

          <div class="mt-16">
            <p class="text-sm text-gray-500">
              Recommended: square image (400x400)
            </p>
          </div>
        </div>

        <!-- Form Fields -->
        <div class="space-y-6">
          <!-- Profile Name -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Display Name
            </label>

            <input
              type="text"
              name="profile_name"
              value="{{ form.profile_name.value|default_if_none:'' }}"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500"
            />
          </div>
          <!-- Skills -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Skills
            </label>

            <input
              id="id_skills"
              type="text"
              name="skills"
              value="{{form.instance.skills|default_if_none:''}}"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500"
            />
          </div>

          <!-- Bio -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Bio
            </label>

            <textarea
              name="bio"
              rows="4"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 resize-none"
              placeholder="Tell us about yourself..."
            >
{{ form.bio.value|default_if_none:'' }}</textarea
            >
          </div>

          <!-- Location -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Location
            </label>

            <input
              type="text"
              name="location"
              value="{{ form.location.value|default_if_none:'' }}"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500"
              placeholder="City, Country"
            />
          </div>

          <!-- Website -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              Website
            </label>

            <input
              type="url"
              name="link"
              value="{{ form.link.value|default_if_none:'' }}"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500"
              placeholder="https://yourwebsite.com"
            />
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mt-8 pt-6 border-t border-gray-200">
          <button
            type="submit"
            class="px-8 py-3 bg-linear-to-r from-violet-600 to-fuchsia-600 text-white rounded-xl font-semibold hover:shadow-lg transition"
          >
            Save Changes
          </button>

          <a
            href="{% url 'user:profile' request.user.username %}"
            class="px-8 py-3 border border-gray-300 text-gray-700 rounded-xl font-semibold hover:bg-gray-50 transition"
          >
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>



<script src="{% static 'js/edit_profile.js'%}"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script>
  tsParticles.load("tsparticles", {
    background: { color: { value: "transparent" } },
    fpsLimit: 60,
    particles: {
      number: { value: 30, density: { enable: true, area: 800 } },
      color: { value: "#a855f7" },
      shape: { type: "circle" },
      opacity: { value: 0.6 },
      size: { value: { min: 10, max: 70 } }, // larger particles
      move: {
        enable: true,
        speed: 1.5,
        random: true,
        straight: false,
        outModes: { default: "out" },
      },
      links: { enable: false },
    },
    interactivity: {
      events: { onHover: { enable: true, mode: "repulse" } },
      modes: { repulse: { distance: 100, duration: 0.4 } },
    },
    detectRetina: true,
  });
</script>

{% endblock %}
