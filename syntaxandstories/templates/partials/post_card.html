<div class="bg-white shadow rounded-2xl mb-6 overflow-hidden">
    {% if post.media %}
        {% if post.is_video %}
            <video class="w-full h-64 object-cover" controls>
                <source src="{{ post.media.url }}">
                Your browser does not support the video tag
            </video>
        {% elif post.is_image %}
            <img src="{{ post.media.url }}" class="w-full h-60 object-cover">
        {% endif %}
    {% endif %}

    <div class="p-4">
        <p class="text-gray-800 text-sm mb-2 line-clamp-3">{{ post.content }}</p>
        


        <div class="mt-3 flex items-center justify-between text-gray-500 text-xs">
            <span>{{ post.likes.count }} Likes</span>
            <span>{{ post.comments.count }} Comments</span>
        </div>
    </div>
</div>
