{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
<style>
    #tsparticles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1; /* behind the form */
}

.flex.flex-col.items-center.justify-center.mb-6 {
  position: relative; 
  z-index: 1; /* ensures form sits above particles */
}
</style>
</head>
<body class="bg-purple-50 mt-28">
    <nav class="hidden bg-white/80 fixed z-50 mb-4 top-0 w-full sm:flex justify-between p-3 backdrop-blur-md shadow-xl">
        <div class="flex items-center gap-3 justify-start">
            <a href="{% url 'syntaxandstories:home' %}" class="bg-linear-to-r  from-violet-600 to-fuchsia-600 px-4 py-3 rounded-2xl hover:scale-110 transition hover:cursor-pointer">
                <svg class="stroke-white w-6 hover:scale-100" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
                </svg>
            </a>
            <p class="text-2xl font-extrabold bg-linear-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
                Syntax & Stories
            </p>
        </div>

        <div class="flex gap-3 text-xl">
            <a href="{% url 'syntaxandstories:home' %}">
            <div class="flex items-center gap-2 hover:bg-gray-50 rounded-2xl
                {% if request.resolver_match.url_name == 'home' %}
                 text-purple-700
                 bg-purple-50 rounded-xl 
                 {% else%}
                text-slate-400
                {% endif%}
                text-lg px-3 py-2">
                <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>

                    Home
                </div>
            </a>
            <a href="{% url 'syntaxandstories:feed' %}">
            <div  class="flex items-center gap-2 hover:bg-gray-50 rounded-2xl
                {% if request.resolver_match.url_name == 'feed' %}
                 text-purple-700
                 bg-purple-50 rounded-xl 
                 {% else%}
                text-slate-400
                {% endif%}
                text-lg px-3 py-2">
                <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                </svg>
                    Feed
                </div>
            </a>

            <a href="#">
                <div  class="flex items-center gap-2 hover:bg-gray-50 rounded-2xl
                {% if request.resolver_match.url_name == 'chat' %}
                 text-purple-700
                 bg-purple-50 rounded-xl 
                 {% else%}
                text-slate-400
                {% endif%}
                text-lg px-3 py-2">
                
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 0 1-.923 1.785A5.969 5.969 0 0 0 6 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337Z" />
                </svg>
                Chats
                </div>
            </a>
            {% if request.user.is_authenticated %}
            <a href="{% url 'user:profile' request.user.username %}">
                <div  class="flex items-center gap-2 hover:bg-gray-50 rounded-2xl
                {% if 'profile' in request.resolver_match.url_name %}
                 text-purple-700
                 bg-purple-50 rounded-xl 
                 {% else%}
                text-slate-400
                {% endif%}
                text-lg px-3 py-2">
                <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                    Profile
                </div>
            </a>
            {% endif %}


            {% if user.is_authenticated %}


            <a href="{% url 'user:logout' %}"
            class="flex items-center gap-2 px-3 py-2 text-slate-400 transition hover:bg-gray-50 rounded-2xl text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
                </svg>

                Logout
            </a>
            {% else %}

            <a href="{% url 'user:sign_up' %}">
                <div class="flex items-center gap-2 hover:bg-gray-50 rounded-2xl
                {% if request.resolver_match.url_name == 'sign_up' %}
                 text-purple-700
                 bg-purple-50 rounded-xl 
                 {% else%}
                text-slate-400
                {% endif%}
                text-lg px-3 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                </svg>
                    Sign Up
                </div>
            </a>

            <a href="{% url 'user:login' %}">
                <div class="flex items-center gap-2 hover:bg-gray-50 rounded-2xl
                {% if request.resolver_match.url_name == 'login' %}
                 text-purple-700
                 bg-purple-50 rounded-xl 
                 {% else%}
                text-slate-400
                {% endif%}
                text-lg px-3 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 0-7.5 0v3.75m11.122 4.631a3.752 3.752 0 0 0-.75-3.369l-1.499-1.499a3.752 3.752 0 0 0-3.369-.75M15.75 12v3.75m0 0a3.75 3.75 0 1 0 7.5 0m-7.5 0v-3.75" />
                </svg>
                    Login
                </div>
            </a>

            
            {% endif%}

            
        </div>
    </nav>



    <script>
        function getCookie(name) {
    let cookieValue = null
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";")
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim()
            if (cookie.substring(0, name.length + 1) === (name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1))
                break
            }
        }
    }
    return cookieValue
}
    </script>
    {% block content %}{% endblock %}
</body>
</html>
